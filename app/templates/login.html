<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Finance Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">⚡ Finance Hub</div>
    <div class="login-sub">Internal Financial Management</div>
    <div id="login-error" class="alert alert-danger" style="display:none"></div>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Username" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk</button>
  </div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("login-error");
  errEl.style.display = "none";
  if (!username || !password) { errEl.textContent = "Username dan password wajib diisi."; errEl.style.display = "block"; return; }
  const resp = await fetch("/auth/login", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
  const data = await resp.json();
  if (!data.ok) { errEl.textContent = data.pesan; errEl.style.display = "block"; return; }
  window.location.href = data.must_change_pw ? "/auth/change-password" : "/select-company";
}
document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
