<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ganti Password — Finance Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🔐 Ganti Password</div>
    <div class="login-sub">Wajib ganti password sebelum melanjutkan</div>
    <div id="pw-error"   class="alert alert-danger"  style="display:none"></div>
    <div id="pw-success" class="alert alert-success" style="display:none"></div>
    <div class="form-group"><label>Password Lama</label><input type="password" id="old_pw" placeholder="Password saat ini"></div>
    <div class="form-group"><label>Password Baru</label><input type="password" id="new_pw" placeholder="Minimal 8 karakter"></div>
    <div class="form-group"><label>Konfirmasi Password Baru</label><input type="password" id="confirm_pw" placeholder="Ulangi password baru"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doChangePw()">Simpan Password Baru</button>
  </div>
</div>
<script>
async function doChangePw() {
  const old_pw = document.getElementById("old_pw").value;
  const new_pw = document.getElementById("new_pw").value;
  const confirm = document.getElementById("confirm_pw").value;
  const errEl = document.getElementById("pw-error");
  const successEl = document.getElementById("pw-success");
  errEl.style.display = successEl.style.display = "none";
  if (new_pw !== confirm) { errEl.textContent = "Konfirmasi password tidak sama."; errEl.style.display = "block"; return; }
  const resp = await fetch("/auth/change-password", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ old_password: old_pw, new_password: new_pw }) });
  const data = await resp.json();
  if (!data.ok) { errEl.textContent = data.pesan; errEl.style.display = "block"; }
  else { successEl.textContent = "Password berhasil diubah. Mengalihkan..."; successEl.style.display = "block"; setTimeout(() => { window.location.href = "/select-company"; }, 1500); }
}
</script>
</body>
</html>
